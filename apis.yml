  description: Sysco's food distribution capabilities (product catalog browsing, order management, delivery tracking, account management, and pricing) are exposed through an Apollo GraphQL supergraph powering the Sysco Shop ecommerce platform, plus EDI (X12) integration for trading partners. Access is gated behind customer/partner onboarding via the login-only APIC Developer Portal; Sysco publishes no public, self-serve OpenAPI specification or open API reference. The OpenAPI artifact below is a non-authoritative, illustrative model of the documented capability domains, not a contract published by Sysco.
