aid: sysco
name: Sysco
description: Sysco is the global leader in selling, marketing, and distributing food products to restaurants, healthcare and
  educational facilities, lodging establishments, and other foodservice customers. Sysco's APIC Developer Portal provides
  REST APIs for product catalog browsing, order management, delivery tracking, account management, and pricing integration,
  enabling partners and customers to automate their food distribution workflows.
