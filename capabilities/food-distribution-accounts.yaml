naftiko: 1.0.0-alpha2
info:
  label: Sysco Food Distribution API — Accounts
  description: 'Sysco Food Distribution API — Accounts. 2 operations. Lead operation: List Accounts. Self-contained Naftiko
    capability covering one Sysco business surface.'
  tags:
  - Sysco
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYSCO_API_KEY: SYSCO_API_KEY
capability:
  consumes:
  - type: http
    namespace: food-distribution-accounts
    baseUri: https://api.sysco.com
    description: Sysco Food Distribution API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: listaccounts
        method: GET
        description: List Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: accounts-accountId
      path: /accounts/{accountId}
      operations:
      - name: getaccount
        method: GET
        description: Get Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SYSCO_API_KEY}}'
  exposes:
  - type: rest
    namespace: food-distribution-accounts-rest
    port: 8080
    description: REST adapter for Sysco Food Distribution API — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: listaccounts
        description: List Accounts
        call: food-distribution-accounts.listaccounts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}
      name: accounts-accountid
      description: REST surface for accounts-accountId.
      operations:
      - method: GET
        name: getaccount
        description: Get Account
        call: food-distribution-accounts.getaccount
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: food-distribution-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sysco Food Distribution API — Accounts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-accounts
      description: List Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: food-distribution-accounts.listaccounts
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account
      description: Get Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: food-distribution-accounts.getaccount
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
