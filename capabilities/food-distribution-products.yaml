naftiko: 1.0.0-alpha2
info:
  label: Sysco Food Distribution API — Products
  description: 'Sysco Food Distribution API — Products. 2 operations. Lead operation: List Products. Self-contained Naftiko
    capability covering one Sysco business surface.'
  tags:
  - Sysco
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYSCO_API_KEY: SYSCO_API_KEY
capability:
  consumes:
  - type: http
    namespace: food-distribution-products
    baseUri: https://api.sysco.com
    description: Sysco Food Distribution API — Products business capability. Self-contained, no shared references.
    resources:
    - name: products
      path: /products
      operations:
      - name: listproducts
        method: GET
        description: List Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          description: Filter by product category.
        - name: keyword
          in: query
          type: string
          description: Search by keyword.
        - name: brand
          in: query
          type: string
          description: Filter by brand name.
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
    - name: products-productId
      path: /products/{productId}
      operations:
      - name: getproduct
        method: GET
        description: Get Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: string
          description: The Sysco product identifier (SUPC).
          required: true
    authentication:
      type: bearer
      token: '{{env.SYSCO_API_KEY}}'
  exposes:
  - type: rest
    namespace: food-distribution-products-rest
    port: 8080
    description: REST adapter for Sysco Food Distribution API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for products.
      operations:
      - method: GET
        name: listproducts
        description: List Products
        call: food-distribution-products.listproducts
        with:
          category: rest.category
          keyword: rest.keyword
          brand: rest.brand
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{productid}
      name: products-productid
      description: REST surface for products-productId.
      operations:
      - method: GET
        name: getproduct
        description: Get Product
        call: food-distribution-products.getproduct
        with:
          productId: rest.productId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: food-distribution-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sysco Food Distribution API — Products. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-products
      description: List Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: food-distribution-products.listproducts
      with:
        category: tools.category
        keyword: tools.keyword
        brand: tools.brand
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: food-distribution-products.getproduct
      with:
        productId: tools.productId
      outputParameters:
      - type: object
        mapping: $.
