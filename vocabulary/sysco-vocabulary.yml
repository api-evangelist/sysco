vocabulary:
  name: Sysco Food Distribution API Vocabulary
  description: >-
    Vocabulary for Sysco's food distribution platform APIs, covering product catalog,
    ordering, delivery, pricing, and supply chain operations for foodservice operators.
  version: '1.0'
  created: '2026-05-03'
  terms:
    - term: SUPC
      definition: >-
        Sysco Universal Product Code — the unique identifier assigned by Sysco
        to each product in its distribution catalog.
      tags:
        - Product
        - Identification
        - Catalog

    - term: Order Guide
      definition: >-
        A customer-specific list of regularly ordered products from Sysco,
        used to streamline repeat ordering for foodservice operators.
      tags:
        - Ordering
        - Customer
        - Catalog

    - term: Food Service Operator
      definition: >-
        A Sysco customer such as a restaurant, school, hospital, or hotel that
        purchases food products through the Sysco distribution network.
      tags:
        - Customer
        - Food Service
        - Distribution

    - term: Case
      definition: >-
        The standard unit of measure (CS) for most Sysco products, representing
        a carton or box containing multiple units of a food product.
      tags:
        - Ordering
        - Units
        - Product

    - term: Contract Price
      definition: >-
        The negotiated price for a product specific to a Sysco customer account,
        which may differ from the published list price.
      tags:
        - Pricing
        - Contract
        - Customer

    - term: GTIN
      definition: >-
        Global Trade Item Number — an internationally recognized barcode identifier
        for tracking products across the supply chain.
      tags:
        - Product
        - Identification
        - Supply Chain

    - term: Route
      definition: >-
        A Sysco delivery route servicing a geographic area, determining delivery
        schedule availability and estimated arrival windows for customers.
      tags:
        - Delivery
        - Logistics
        - Distribution

    - term: Sysco Shop
      definition: >-
        Sysco's customer-facing ecommerce ordering platform (web and mobile, serving the
        US, Canada, and the Bahamas) where foodservice operators browse catalogs, manage
        order guides, and place orders. Backed by an Apollo GraphQL supergraph.
      tags:
        - Ordering Platform
        - E-Commerce
        - Customer Portal

    - term: Subgraph
      definition: >-
        A domain-specific GraphQL service within Sysco's Apollo supergraph. Sysco runs eight
        subgraphs spanning ordering, product, pricing, delivery, and accounts.
      tags:
        - GraphQL
        - Architecture
        - Integration

    - term: EDI (X12)
      definition: >-
        Electronic Data Interchange using ANSI X12 transaction sets (e.g. 810 Invoice, 816
        Organizational Relationships, 820 Payment Order/Remittance Advice) for B2B
        trading-partner integration with Sysco's procurement and billing systems.
      tags:
        - Integration
        - Supply Chain
        - Trading Partner

  dimensions:
    operational:
      - Product Catalog Browsing
      - Order Placement
      - Delivery Tracking
      - Pricing Retrieval
      - Account Management
    capability:
      - Restaurant Technology Integration
      - ERP System Integration
      - Supply Chain Automation
      - Foodservice Portal Development
      - Inventory Management Integration
