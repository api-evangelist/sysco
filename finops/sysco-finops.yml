principles:
  - name: Visibility
    description: Customer order and invoice visibility is delivered through Sysco Shop and the
      customer's account team, not a public usage API.
  - name: Allocation
    description: Cost allocation is performed in the customer's own AP and procurement systems
      against Sysco invoices.
  - name: Optimization
    description: Optimization is addressed through Sysco's account managers, contract pricing,
      and order-pattern reviews.
  - name: Accountability
    description: Spend accountability sits with the customer's procurement or foodservice operations
      team holding the Sysco account.
